<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intel Feed — AI & VC Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --bg2: #111113;
  --bg3: #18181c;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --text2: #8a8680;
  --text3: #4a4845;
  --accent: #e8d5a3;
  --accent2: #c4a96b;
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --orange: #fb923c;
  --teal: #2dd4bf;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,11,0.9);
  backdrop-filter: blur(16px);
  padding: 0 24px;
}
.header-inner {
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: center; gap: 24px;
  height: 56px;
}
.logo {
  font-family: var(--font-head);
  font-size: 18px; font-weight: 800;
  color: var(--accent); letter-spacing: -0.02em;
  text-decoration: none; flex-shrink: 0;
}
.logo span { color: var(--text3); font-weight: 400; }

.search-wrap {
  flex: 1; max-width: 340px;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--text3); pointer-events: none;
}
#search {
  width: 100%; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--font-body); font-size: 13px;
  padding: 7px 12px 7px 32px; outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--border2); }
#search::placeholder { color: var(--text3); }

.header-stats {
  margin-left: auto; display: flex; align-items: center; gap: 16px;
}
.hstat {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text3); white-space: nowrap;
}
.hstat strong { color: var(--accent); font-weight: 500; }

.last-updated {
  font-family: var(--font-mono); font-size: 10px; color: var(--text3);
  padding: 3px 8px; background: var(--bg3); border-radius: 4px;
  border: 1px solid var(--border);
}

/* ── Layout ── */
.layout {
  max-width: 1280px; margin: 0 auto;
  display: grid; grid-template-columns: 220px 1fr 280px;
  gap: 0; min-height: calc(100vh - 56px);
}

/* ── Left Sidebar ── */
.sidebar-left {
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  position: sticky; top: 56px;
  height: calc(100vh - 56px); overflow-y: auto;
}

.sidebar-section { margin-bottom: 28px; }
.sidebar-label {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.1em; color: var(--text3);
  text-transform: uppercase; margin-bottom: 10px;
  padding-left: 2px;
}

.filter-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 6px 8px;
  background: transparent; border: none; border-radius: 6px;
  color: var(--text2); font-family: var(--font-body); font-size: 13px;
  cursor: pointer; text-align: left; gap: 8px;
  transition: background .15s, color .15s;
}
.filter-btn:hover { background: var(--bg3); color: var(--text); }
.filter-btn.active { background: var(--bg3); color: var(--accent); }
.filter-btn .count {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text3); flex-shrink: 0;
}
.filter-btn.active .count { color: var(--accent2); }

.score-filter { display: flex; flex-direction: column; gap: 4px; }
.score-row {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 3px 0;
}
.score-row input { cursor: pointer; accent-color: var(--accent2); }
.score-row label {
  font-size: 12px; color: var(--text2); cursor: pointer;
  font-family: var(--font-mono);
}

/* ── Main Feed ── */
.feed-main {
  padding: 0;
  border-right: 1px solid var(--border);
}

.feed-toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 10;
  background: rgba(10,10,11,0.95); backdrop-filter: blur(8px);
}
.sort-btn {
  font-family: var(--font-mono); font-size: 11px;
  padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text3); cursor: pointer; transition: all .15s;
}
.sort-btn:hover { border-color: var(--border2); color: var(--text2); }
.sort-btn.active { border-color: var(--accent2); color: var(--accent); background: rgba(196,169,107,0.08); }

.results-count {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 11px; color: var(--text3);
}

/* ── Article Cards ── */
.article-card {
  display: grid; grid-template-columns: 1fr auto;
  gap: 16px; padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  cursor: pointer; text-decoration: none; color: inherit;
  position: relative;
}
.article-card:hover { background: var(--bg2); }
.article-card.must-read { border-left: 2px solid var(--accent2); }

.card-body { min-width: 0; }
.card-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px; flex-wrap: wrap;
}
.source-badge {
  font-family: var(--font-mono); font-size: 10px;
  padding: 2px 7px; border-radius: 3px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); white-space: nowrap;
}
.category-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 3px;
  font-family: var(--font-mono); font-weight: 500; white-space: nowrap;
}
.must-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 3px;
  background: rgba(196,169,107,0.15); color: var(--accent2);
  border: 1px solid rgba(196,169,107,0.25); font-family: var(--font-mono);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.card-date {
  font-family: var(--font-mono); font-size: 10px; color: var(--text3);
  margin-left: auto;
}

.card-title {
  font-family: var(--font-head); font-size: 16px; font-weight: 700;
  line-height: 1.3; color: var(--text); margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.article-card:hover .card-title { color: var(--accent); }

.card-tldr {
  font-size: 13px; color: var(--text2); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.card-footer {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
  flex-wrap: wrap;
}
.tag-pill {
  font-size: 10px; padding: 2px 7px;
  border-radius: 3px; border: 1px solid var(--border);
  color: var(--text3); background: transparent; font-family: var(--font-mono);
}
.score-pill {
  display: flex; align-items: center; gap: 4px;
  margin-left: auto; flex-shrink: 0;
}
.score-num {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
}
.score-bar {
  display: flex; gap: 2px;
}
.score-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--bg3);
}
.score-dot.filled { background: var(--accent2); }

.card-image {
  width: 100px; height: 72px; border-radius: 6px;
  object-fit: cover; flex-shrink: 0;
  border: 1px solid var(--border); background: var(--bg3);
  display: block;
}
.card-image-placeholder {
  width: 100px; height: 72px; border-radius: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-image-placeholder span { font-size: 20px; opacity: 0.4; }

/* ── Right Sidebar ── */
.sidebar-right {
  padding: 24px 20px;
  position: sticky; top: 56px;
  height: calc(100vh - 56px); overflow-y: auto;
}

.must-read-card {
  padding: 12px; border-radius: var(--r);
  background: var(--bg2); border: 1px solid var(--border);
  margin-bottom: 10px; cursor: pointer; text-decoration: none;
  display: block; transition: border-color .15s;
}
.must-read-card:hover { border-color: var(--border2); }
.mr-title {
  font-family: var(--font-head); font-size: 13px; font-weight: 600;
  color: var(--text); line-height: 1.3; margin-bottom: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.mr-source {
  font-family: var(--font-mono); font-size: 10px; color: var(--text3);
}
.mr-score {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--accent2); float: right;
}

.sources-list { display: flex; flex-direction: column; gap: 4px; }
.source-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 0; border-bottom: 1px solid var(--border);
}
.source-row:last-child { border-bottom: none; }
.source-name { font-size: 12px; color: var(--text2); }
.source-count { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }

/* ── Category Colors ── */
.cat-ai-research   { background: rgba(96,165,250,0.1);  color: #93c5fd; }
.cat-llm-models    { background: rgba(167,139,250,0.1); color: #c4b5fd; }
.cat-vc-deals      { background: rgba(74,222,128,0.1);  color: #86efac; }
.cat-market-maps   { background: rgba(74,222,128,0.1);  color: #86efac; }
.cat-crypto-web3   { background: rgba(251,146,60,0.1);  color: #fdba74; }
.cat-policy-reg    { background: rgba(248,113,113,0.1); color: #fca5a5; }
.cat-founders      { background: rgba(45,212,191,0.1);  color: #5eead4; }
.cat-mena-gulf     { background: rgba(232,213,163,0.1); color: #e8d5a3; }
.cat-frontier-tech { background: rgba(167,139,250,0.1); color: #c4b5fd; }
.cat-enterprise-ai { background: rgba(96,165,250,0.1);  color: #93c5fd; }
.cat-consumer      { background: rgba(45,212,191,0.1);  color: #5eead4; }
.cat-deep-tech     { background: rgba(167,139,250,0.1); color: #c4b5fd; }
.cat-infra-devtools{ background: rgba(251,146,60,0.1);  color: #fdba74; }
.cat-product-growth{ background: rgba(45,212,191,0.1);  color: #5eead4; }
.cat-safety-alignment{ background: rgba(248,113,113,0.1);color: #fca5a5; }
.cat-open-source   { background: rgba(74,222,128,0.1);  color: #86efac; }
.cat-investing-ops { background: rgba(74,222,128,0.1);  color: #86efac; }

/* ── Empty State ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 24px; color: var(--text3);
  text-align: center;
}
.empty-state h3 { font-family: var(--font-head); font-size: 18px; margin-bottom: 8px; color: var(--text2); }
.empty-state p { font-size: 13px; }

/* ── Loading ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--text3);
  font-family: var(--font-mono); font-size: 12px; gap: 10px;
}
.spinner {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--bg3); border-top-color: var(--accent2);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Fade in ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.article-card { animation: fadeUp .25s ease both; }

/* ── Responsive ── */
@media (max-width: 1100px) {
  .layout { grid-template-columns: 200px 1fr; }
  .sidebar-right { display: none; }
}
@media (max-width: 760px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar-left { display: none; }
  .article-card { grid-template-columns: 1fr; }
  .card-image, .card-image-placeholder { display: none; }
  .header-stats { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">INTEL<span>FEED</span></a>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search articles, sources, tags…">
    </div>

    <div class="header-stats">
      <div class="hstat">Articles: <strong id="stat-total">—</strong></div>
      <div class="hstat">Sources: <strong id="stat-sources">—</strong></div>
      <div class="hstat">Must-reads: <strong id="stat-must">—</strong></div>
      <div class="last-updated" id="stat-updated">Updating…</div>
    </div>
  </div>
</header>

<div class="layout">

  <!-- Left Sidebar -->
  <aside class="sidebar-left">
    <div class="sidebar-section">
      <div class="sidebar-label">View</div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">
        All articles <span class="count" id="cnt-all">—</span>
      </button>
      <button class="filter-btn" data-filter="must_read" onclick="setFilter('must_read',this)">
        Must reads <span class="count" id="cnt-must">—</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Categories</div>
      <div id="category-filters"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Min score</div>
      <div class="score-filter">
        <div class="score-row">
          <input type="radio" name="score" id="s0" value="0" checked onchange="setMinScore(0)">
          <label for="s0">All</label>
        </div>
        <div class="score-row">
          <input type="radio" name="score" id="s6" value="6" onchange="setMinScore(6)">
          <label for="s6">6+ good</label>
        </div>
        <div class="score-row">
          <input type="radio" name="score" id="s8" value="8" onchange="setMinScore(8)">
          <label for="s8">8+ great</label>
        </div>
        <div class="score-row">
          <input type="radio" name="score" id="s9" value="9" onchange="setMinScore(9)">
          <label for="s9">9+ essential</label>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Sources</div>
      <div id="source-filters"></div>
    </div>
  </aside>

  <!-- Main Feed -->
  <main class="feed-main">
    <div class="feed-toolbar">
      <button class="sort-btn active" onclick="setSort('date',this)">Latest</button>
      <button class="sort-btn" onclick="setSort('score',this)">Top Score</button>
      <button class="sort-btn" onclick="setSort('source',this)">By Source</button>
      <span class="results-count" id="results-count"></span>
    </div>
    <div id="feed-container">
      <div class="loading"><div class="spinner"></div>Loading intelligence…</div>
    </div>
  </main>

  <!-- Right Sidebar -->
  <aside class="sidebar-right">
    <div class="sidebar-section">
      <div class="sidebar-label">Must reads today</div>
      <div id="must-reads-list"></div>
    </div>
    <div class="sidebar-section" style="margin-top:24px">
      <div class="sidebar-label">Top sources</div>
      <div class="sources-list" id="top-sources"></div>
    </div>
  </aside>

</div>

<script>
let allArticles = [];
let currentFilter = 'all';
let currentCategory = null;
let currentSource = null;
let currentSort = 'date';
let minScore = 0;
let searchQuery = '';

const CATEGORY_LABELS = {
  'ai-research':'AI Research','llm-models':'LLM Models','vc-deals':'VC Deals',
  'market-maps':'Market Maps','crypto-web3':'Crypto/Web3','policy-reg':'Policy & Reg',
  'founders':'Founders','mena-gulf':'MENA / Gulf','frontier-tech':'Frontier Tech',
  'enterprise-ai':'Enterprise AI','consumer':'Consumer','deep-tech':'Deep Tech',
  'infra-devtools':'Infra & DevTools','product-growth':'Product Growth',
  'safety-alignment':'Safety & Alignment','open-source':'Open Source','investing-ops':'Investing Ops',
};

async function loadData() {
  try {
    const [articles, stats, mustReads, sources, categories] = await Promise.all([
      fetch('data/articles.json').then(r=>r.json()),
      fetch('data/stats.json').then(r=>r.json()),
      fetch('data/must_reads.json').then(r=>r.json()),
      fetch('data/sources.json').then(r=>r.json()),
      fetch('data/categories.json').then(r=>r.json()),
    ]);

    allArticles = articles;

    document.getElementById('stat-total').textContent = stats.total_articles.toLocaleString();
    document.getElementById('stat-sources').textContent = stats.total_sources;
    document.getElementById('stat-must').textContent = stats.must_reads;
    document.getElementById('stat-updated').textContent = formatDate(stats.last_updated);
    document.getElementById('cnt-all').textContent = articles.length;
    document.getElementById('cnt-must').textContent = articles.filter(a=>a.must_read).length;

    renderCategoryFilters(categories);
    renderSourceFilters(sources.slice(0,12));
    renderMustReads(mustReads.slice(0,6));
    renderTopSources(sources.slice(0,8));
    renderFeed();

  } catch(e) {
    document.getElementById('feed-container').innerHTML =
      '<div class="empty-state"><h3>Could not load data</h3><p>Run the crawler first to generate feed data.</p></div>';
  }
}

function renderCategoryFilters(categories) {
  const el = document.getElementById('category-filters');
  el.innerHTML = categories.map(c => `
    <button class="filter-btn" onclick="setCategory('${c.category}',this)">
      <span>${CATEGORY_LABELS[c.category]||c.category}</span>
      <span class="count">${c.count}</span>
    </button>
  `).join('');
}

function renderSourceFilters(sources) {
  const el = document.getElementById('source-filters');
  el.innerHTML = sources.map(s => `
    <button class="filter-btn" onclick="setSourceFilter('${s.source}',this)" title="${s.source}">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.source}</span>
      <span class="count">${s.count}</span>
    </button>
  `).join('');
}

function renderMustReads(articles) {
  const el = document.getElementById('must-reads-list');
  el.innerHTML = articles.map(a => `
    <a class="must-read-card" href="${a.url}" target="_blank" rel="noopener">
      <span class="mr-score">${a.score}/10</span>
      <div class="mr-title">${a.title}</div>
      <div class="mr-source">${a.source} · ${formatDateShort(a.published_at)}</div>
    </a>
  `).join('');
}

function renderTopSources(sources) {
  const el = document.getElementById('top-sources');
  el.innerHTML = sources.map(s => `
    <div class="source-row">
      <span class="source-name">${s.source}</span>
      <span class="source-count">${s.count} · avg ${s.avg_score}</span>
    </div>
  `).join('');
}

function getFiltered() {
  let list = [...allArticles];

  if (currentFilter === 'must_read') list = list.filter(a => a.must_read);
  if (currentCategory) list = list.filter(a => a.category === currentCategory);
  if (currentSource) list = list.filter(a => a.source === currentSource);
  if (minScore > 0) list = list.filter(a => a.score >= minScore);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.tldr?.toLowerCase().includes(q) ||
      a.source.toLowerCase().includes(q) ||
      (a.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
      a.category?.toLowerCase().includes(q)
    );
  }

  if (currentSort === 'score') list.sort((a,b) => b.score - a.score);
  else if (currentSort === 'source') list.sort((a,b) => a.source.localeCompare(b.source));
  else list.sort((a,b) => new Date(b.published_at) - new Date(a.published_at));

  return list;
}

function renderFeed() {
  const list = getFiltered();
  const el = document.getElementById('feed-container');
  document.getElementById('results-count').textContent = `${list.length} article${list.length!==1?'s':''}`;

  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><h3>No articles found</h3><p>Try adjusting your filters.</p></div>';
    return;
  }

  el.innerHTML = list.map((a, i) => renderCard(a, i)).join('');
}

function renderCard(a, i) {
  const catClass = 'cat-' + (a.category||'ai-research').replace(/[^a-z0-9-]/g,'-');
  const catLabel = CATEGORY_LABELS[a.category] || a.category || '';
  const tags = (a.tags||[]).slice(0,3);
  const delay = Math.min(i, 10) * 30;
  const scoreDots = Array.from({length:10}, (_,j) =>
    `<div class="score-dot ${j < a.score ? 'filled' : ''}"></div>`
  ).join('');

  const imageHtml = a.image_url
    ? `<img class="card-image" src="${a.image_url}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="card-image-placeholder"><span>${catEmoji(a.category)}</span></div>`;

  return `
    <a class="article-card ${a.must_read?'must-read':''}"
       href="${a.url}" target="_blank" rel="noopener"
       style="animation-delay:${delay}ms">
      <div class="card-body">
        <div class="card-meta">
          <span class="source-badge">${a.source}</span>
          <span class="category-badge ${catClass}">${catLabel}</span>
          ${a.must_read ? '<span class="must-badge">Must Read</span>' : ''}
          <span class="card-date">${formatDateShort(a.published_at)}</span>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-tldr">${a.tldr||''}</div>
        <div class="card-footer">
          ${tags.map(t=>`<span class="tag-pill">#${t}</span>`).join('')}
          <div class="score-pill" title="Relevance score: ${a.score}/10">
            <span class="score-num" style="color:${scoreColor(a.score)}">${a.score}</span>
            <div class="score-bar">${scoreDots}</div>
          </div>
        </div>
      </div>
      ${imageHtml}
    </a>`;
}

function catEmoji(cat) {
  const m = {
    'ai-research':'🤖','llm-models':'🧠','vc-deals':'💰','crypto-web3':'⛓',
    'policy-reg':'⚖️','founders':'🚀','mena-gulf':'🌍','frontier-tech':'🔬',
    'enterprise-ai':'🏢','consumer':'👤','deep-tech':'⚗️','infra-devtools':'⚙️',
    'product-growth':'📈','safety-alignment':'🛡','open-source':'🔓','investing-ops':'📊',
  };
  return m[cat] || '📰';
}

function scoreColor(s) {
  if (s >= 9) return '#4ade80';
  if (s >= 7) return '#e8d5a3';
  if (s >= 5) return '#fb923c';
  return '#8a8680';
}

function formatDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  } catch { return iso; }
}

function formatDateShort(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso), now = new Date();
    const diff = Math.floor((now - d) / 36e5);
    if (diff < 1) return 'just now';
    if (diff < 24) return diff + 'h ago';
    if (diff < 48) return 'yesterday';
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  } catch { return ''; }
}

function setFilter(f, btn) {
  currentFilter = f; currentCategory = null; currentSource = null;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function setCategory(cat, btn) {
  if (currentCategory === cat) {
    currentCategory = null; btn.classList.remove('active');
    document.querySelector('[data-filter="all"]').classList.add('active');
  } else {
    currentCategory = cat; currentFilter = null; currentSource = null;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  renderFeed();
}

function setSourceFilter(source, btn) {
  if (currentSource === source) {
    currentSource = null; btn.classList.remove('active');
    document.querySelector('[data-filter="all"]').classList.add('active');
  } else {
    currentSource = source; currentCategory = null; currentFilter = null;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  renderFeed();
}

function setSort(s, btn) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function setMinScore(s) {
  minScore = s; renderFeed();
}

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderFeed();
  }, 200);
});

loadData();
</script>
</body>
</html>
